{% extends 'base.html' %}

{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4 text-center">Recuperar Contraseña</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="correo_institucional" class="form-label">Correo Institucional</label>
                <input type="email" class="form-control" id="correo_institucional" 
                       name="correo_institucional" required>
                <small class="form-text text-muted">
                    Ingresa tu correo institucional para recibir instrucciones de recuperación.
                </small>
            </div>
            <div class="d-grid gap-3">
                <!-- Botón para enviar instrucciones -->
                <button type="submit" class="btn btn-primary d-flex align-items-center justify-content-center">
                    <i class="bi bi-envelope me-2"></i> Enviar Instrucciones
                </button>
                
                <!-- Botón para volver al inicio -->
                <a href="{% url 'ingreso' %}" class="btn btn-outline-secondary d-flex align-items-center justify-content-center">
                    <i class="bi bi-arrow-left-circle me-2"></i> Volver al inicio de sesión
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}

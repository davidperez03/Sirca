{% extends 'base.html' %}

{% block title %}Restablecer Contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <h2 class="mb-0 text-center flex-grow-1 fw-bold">Restablecer Contraseña</h2>
                    <span class="btn btn-sm invisible"></span>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Nueva Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-primary text-white">
                                <i class="bi bi-key-fill"></i>
                            </span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmar_password" class="form-label fw-semibold">Confirmar Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-primary text-white">
                                <i class="bi bi-key-fill"></i>
                            </span>
                            <input type="password" class="form-control" id="confirmar_password" name="confirmar_password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center py-2">
                        <i class="bi bi-arrow-repeat me-2"></i> Actualizar Contraseña
                    </button>
                </form>

                <div class="text-center mt-4">
                    <a href="{% url 'ingreso' %}" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Volver al inicio de sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
